<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar Fashion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <header class="text-center">
        <h1>RadarFashion - Cadastro</h1>
        <ul>
            <li><a href="index.html">Início</a></li>
            <li><a href="cadastro.html">Cadastro</a></li>
        </ul>
    </header>
    
    <div class="container mt-4">
        <form method="get">

            <div>
                <div>
                <label for="email">Email:</label>
                </div>
                <input type="email" class="form-control mb-3" id="email" name="email" required>
            </div>

            <div>
                <div>
                <label for="telefone">Telefone:</label>
                </div>
                <input type="text" class="form-control mb-3" maxlength="11" minlength="10" id="telefone" name="telefone" required>
            </div>

            <div>
                <div>
                <label for="senha">Senha:</label>
                </div>
                <input type="password" class="form-control mb-3" id="senha" name="senha" required>
            </div>

            <div>
                <button type="submit" class="btn btn-primary mb-3">Cadastrar</button>
            </div>
        </form>

    </div>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
