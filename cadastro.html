<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>RadarFashion</title>
</head>

<body>
    <header class="bg-primary text-white p-3">
        <h1 class="text-center">RadarFashion - Cadastrar</h1>
        <ul class="nav justify-content-center">
            <li><a class="btn btn-secondary m-1" href="index.html">Início</a></li>
            <li><a class="btn btn-secondary m-1" href="cadastro.html">Cadastro</a></li>
            <li><a class="btn btn-secondary m-1" href="login.html">Login</a></li>
        </ul>
    </header>
    <div class="container mt-5 w-50">
        <div class="">        
            <form action="" class="form-group" method="post">
                
                <label for="email">Email:</label>
                <input type="email" class="form-control mb-3" id="email" name="email" placeholder="seuemail@gmail.com" required>

                <label for="telefone">Telefone:</label>
                <input type="text" class="form-control mb-3" id="telefone" name="telefone" placeholder="ex: 27999999999" required>

                <label for="senha">Senha:</label>
                <input type="password" class="form-control mb-3" id="senha" name="senha" placeholder="Digite sua senha com mínimo de 6 caractéres" required>

                <input type="submit" class="btn btn-primary mb-3 w-100" value="Entrar">
            </form>
            <p class="text-center">Já tem uma conta? <a href="login.html">Faça login aqui</a>.</p>
        </div>    
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
